services:
  - type: web
    name: metro-bazaar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: metro-bazaar-db
          property: connectionString

databases:
  - name: metro-bazaar-db
    databaseName: metro_bazaar
    user: metro_user
    plan: free
